name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  web-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Build/test don't hit real DB; use safe placeholders so Next build does
      # not fail on env-guarded module init.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
      JWT_SECRET: ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci
      NEXT_PUBLIC_APP_URL: https://example.test
      NEXT_PUBLIC_APP_VERSION: ci
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter web prisma:generate

      - name: Lint
        run: pnpm --filter web lint

      - name: Typecheck (prod tsconfig)
        run: pnpm --filter web typecheck

      - name: Typecheck (tests tsconfig)
        run: pnpm --filter web typecheck:test

      - name: Test
        run: pnpm --filter web test

      - name: Build
        run: pnpm --filter web build
