name: DB Backup Verify

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  backup-and-dryrun:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.RISTOSAAS_DATABASE_URL }}
      BACKUP_DIR: ./storage/backups
      BACKUP_RETENTION_DAYS: 14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client tools
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Validate secret presence
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "Missing secret RISTOSAAS_DATABASE_URL"
            exit 1
          fi

      - name: Run DB backup
        run: bash ./infra/scripts/db-backup.sh

      - name: Run restore dry-run
        run: bash ./infra/scripts/db-restore-dryrun.sh ./storage/backups/latest.dump

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ./storage/backups/*.dump
          if-no-files-found: error
          retention-days: 14
